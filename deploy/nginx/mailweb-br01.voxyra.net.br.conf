# /etc/nginx/sites-available/mailweb-br01.voxyra.net.br
# Voxyra Mail — Nginx reverse proxy + static frontend
#
# Rotas:
#   /api/*        → backend FastAPI em 127.0.0.1:8001
#   /*            → build estático do frontend React (SPA fallback para /index.html)

# Rate limit para o endpoint de login
limit_req_zone $binary_remote_addr zone=voxyra_login:10m rate=10r/m;

# Redireciona HTTP → HTTPS (habilite após rodar certbot)
server {
    listen 80;
    listen [::]:80;
    server_name mailweb-br01.voxyra.net.br;

    # Bloco necessário para o certbot completar o desafio ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mailweb-br01.voxyra.net.br;

    # ---- SSL (certificados criados pelo certbot) ----
    ssl_certificate     /etc/letsencrypt/live/mailweb-br01.voxyra.net.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mailweb-br01.voxyra.net.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Headers de segurança ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ---- Upload limit (anexos até 25 MB) ----
    client_max_body_size 25M;

    # ---- Frontend estático ----
    root /opt/hostpanel/frontend/build;
    index index.html;

    # Cache agressivo para os assets versionados do CRA
    location /static/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ---- Backend API ----
    location /api/auth/login {
        limit_req zone=voxyra_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri /index.html;
    }

    # ---- Logs ----
    access_log /var/log/nginx/voxyra_access.log;
    error_log  /var/log/nginx/voxyra_error.log warn;
}
